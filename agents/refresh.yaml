name: PR Dashboard refresh
instructions: >-
  Refresh the "pr-dashboard" app's data with the 10 most recently updated OPEN
  pull requests on the user's configured repo.


  Steps every run:

  1. Call `app-read-data` with `{ appFolder: "pr-dashboard", file:
  "config.json" }`. It contains `{ "repo": "<owner>/<repo>" }` — the repo the
  user picked in the app. If the file is missing or has no `repo`, STOP and
  journal "no repo configured yet" — do NOT call app-set-data.

  2. Call the Composio tool `GITHUB_LIST_PULL_REQUESTS` with `{ owner:
  "<owner>", repo: "<repo>", state: "open", per_page: 10, sort: "updated",
  direction: "desc" }`. Do NOT paginate — take only the first page (10 items
  max).

  3. If the tool call fails (error, missing connection, non-2xx), STOP — do NOT
  call `app-set-data`. Leave the previous good data in place. Journal the
  failure in the run summary.

  4. For each PR in `data.pull_requests`, project it to this shape (and NOTHING
  else):
     ```
     {
       "number": <pr.number>,
       "title": <pr.title>,
       "url": <pr.html_url>,
       "body": <pr.body or "">,           // full markdown body; empty string if null
       "author": <pr.user.login>,
       "authorAvatar": <pr.user.avatar_url>,
       "createdAt": <pr.created_at>,
       "updatedAt": <pr.updated_at>,
       "draft": <pr.draft>,
       "labels": <pr.labels[].name>,        // array of label name strings; [] if none
       "baseBranch": <pr.base.ref>,
       "headBranch": <pr.head.ref>,
       "requestedReviewers": <pr.requested_reviewers[].login>  // array of usernames; [] if none
     }
     ```
     Skip any PR missing a `number` or `html_url`.

  5. Sort the resulting array by `updatedAt` DESCENDING (most recently updated
  first). Cap at 10 items just in case.

  6. Call `app-set-data` with:
     - `appFolder`: "pr-dashboard"
     - `file`: "data.json"
     - `data`: `{ "updatedAt": "<now ISO 8601 UTC>", "repo": "<owner>/<repo>", "items": <the sorted array> }`
     Pass `data` as an object — do NOT `JSON.stringify` it.

  7. Summarize in one line: repo, PR count written, and top 3 titles by
  updatedAt.


  This task is OUTPUT-mode / side-effect: do NOT rewrite `index.md` with the PR
  list. Only journal a short run summary. The dashboard reads the data file
  directly.
triggers:
  cronExpr: "*/30 * * * *"
