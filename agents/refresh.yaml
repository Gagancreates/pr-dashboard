name: PR Dashboard refresh (rowboatlabs/rowboat)
instructions: >-
  Refresh the "pr-dashboard" Mini App's data with the 10 most recently updated
  OPEN pull requests on `rowboatlabs/rowboat`.


  Steps every run:

  1. Call the Composio tool `GITHUB_LIST_PULL_REQUESTS` with `{ owner:
  "rowboatlabs", repo: "rowboat", state: "open", per_page: 10, sort: "updated",
  direction: "desc" }`. Do NOT paginate — take only the first page (10 items
  max).

  2. If the tool call fails (error, missing connection, non-2xx), STOP — do NOT
  call `app-set-data`. Leave the previous good data in place. Journal the
  failure in the run summary.

  3. For each PR in `data.pull_requests`, project it to this shape (and NOTHING
  else):
     ```
     {
       "number": <pr.number>,
       "title": <pr.title>,
       "url": <pr.html_url>,
       "body": <pr.body or "">,           // full markdown body; empty string if null
       "author": <pr.user.login>,
       "authorAvatar": <pr.user.avatar_url>,
       "createdAt": <pr.created_at>,
       "updatedAt": <pr.updated_at>,
       "draft": <pr.draft>,
       "labels": <pr.labels[].name>,        // array of label name strings; [] if none
       "baseBranch": <pr.base.ref>,
       "headBranch": <pr.head.ref>,
       "requestedReviewers": <pr.requested_reviewers[].login>  // array of usernames; [] if none
     }
     ```
     Skip any PR missing a `number` or `html_url`.
  4. Sort the resulting array by `updatedAt` DESCENDING (most recently updated
  first). Cap at 10 items just in case.

  5. Call `app-set-data` with:
     - `appFolder`: "pr-dashboard"
     - `file`: "data.json"
     - `data`: `{ "updatedAt": "<now ISO 8601 UTC>", "repo": "rowboatlabs/rowboat", "items": <the sorted array> }`
     Pass `data` as an object — do NOT `JSON.stringify` it.
  6. Summarize in one line: PR count written and top 3 titles by updatedAt.


  This task is OUTPUT-mode / side-effect: do NOT rewrite `index.md` with the PR
  list. Only journal a short run summary. The dashboard reads the data file
  directly.
triggers:
  cronExpr: "*/30 * * * *"
