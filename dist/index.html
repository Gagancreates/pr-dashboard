<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pull Requests</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="titles">
      <h1 id="repo-title">Pull Requests</h1>
      <div class="sub">
        <span id="pr-count" class="count">—</span>
        <span class="dot">·</span>
        <span id="updated" class="muted"></span>
        <a id="view-all" class="view-all" href="#" target="_blank" rel="noopener noreferrer" hidden>View all ↗</a>
      </div>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
        <input id="search" type="search" placeholder="Filter by title, author, label…" autocomplete="off" />
      </div>
      <button id="refresh" class="btn icon" title="Reload">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 1.5v3h-3"/></svg>
      </button>
      <button id="settings" class="btn icon" title="Change repo">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.8v2M8 12.2v2M1.8 8h2M12.2 8h2M3.6 3.6l1.4 1.4M11 11l1.4 1.4M12.4 3.6L11 5M5 11l-1.4 1.4"/></svg>
      </button>
    </div>
  </header>

  <div id="setup" class="setup" hidden>
    <div class="setup-card">
      <h2>Track a repository</h2>
      <p>Open pull requests from any GitHub repo, kept fresh by a background&nbsp;agent.</p>
      <form id="setup-form" class="setup-form">
        <div class="setup-input-wrap">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 .8a7.2 7.2 0 0 0-2.28 14.03c.36.07.5-.15.5-.34l-.01-1.32c-2 .44-2.43-.85-2.43-.85-.33-.83-.8-1.05-.8-1.05-.66-.45.05-.44.05-.44.72.05 1.1.74 1.1.74.65 1.1 1.7.78 2.1.6.07-.47.26-.79.46-.97-1.6-.18-3.28-.8-3.28-3.56 0-.79.28-1.43.74-1.94-.07-.18-.32-.91.07-1.9 0 0 .6-.2 1.98.74a6.9 6.9 0 0 1 3.6 0c1.38-.93 1.98-.74 1.98-.74.4.99.15 1.72.07 1.9.46.5.74 1.15.74 1.94 0 2.77-1.69 3.38-3.3 3.56.26.22.5.66.5 1.33l-.01 1.96c0 .19.13.42.5.34A7.2 7.2 0 0 0 8 .8Z"/></svg>
          <input id="repo-input" type="text" placeholder="owner/repo" autocomplete="off" spellcheck="false" />
        </div>
        <button type="submit" class="btn primary" id="setup-save">Track</button>
      </form>
      <div class="setup-hint">e.g. <button type="button" class="hint-chip" data-example="rowboatlabs/rowboat">rowboatlabs/rowboat</button> <button type="button" class="hint-chip" data-example="vercel/next.js">vercel/next.js</button></div>
      <div id="setup-status" class="status info"></div>
    </div>
  </div>

  <main id="list" class="list" aria-live="polite">
    <div class="loading" id="loading" hidden>Loading pull requests…</div>
    <div class="empty" id="empty" hidden>
      <div class="empty-art">✓</div>
      <div class="empty-title">No open pull requests</div>
      <div class="empty-sub">Everything's merged. The agent refreshes this every 30 minutes.</div>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
