<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open PRs — rowboatlabs/rowboat</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="titles">
      <h1 id="repo-title">rowboatlabs/rowboat</h1>
      <div class="sub">
        <span id="pr-count" class="count">—</span>
        <span class="dot">·</span>
        <span id="updated" class="muted">Loading…</span>
      </div>
    </div>
    <button id="refresh" class="btn" title="Re-read data file">Refresh</button>
  </header>

  <main id="list" class="list" aria-live="polite">
    <div class="empty" id="empty" hidden>No open pull requests.</div>
    <div class="loading" id="loading">Loading pull requests…</div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
